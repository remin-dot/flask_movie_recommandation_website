{% extends "base.html" %}

{% block title %}{{ t('errors.404_title') }} - FlickBase{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <i class="fas fa-exclamation-circle fa-5x text-danger"></i>
            </div>
            <h1 class="display-1">404</h1>
            <h2 class="mb-3">{{ t('errors.404_title') }}</h2>
            <p class="text-muted mb-4">{{ t('errors.404_text') }}</p>
            
            <div class="d-grid gap-2 d-sm-flex justify-content-center">
                <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home"></i> {{ t('errors.go_home') }}
                </a>
                <a href="{{ url_for('movie_list') }}" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-film"></i> {{ t('dashboard.browse_movies') }}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
