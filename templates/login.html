{% extends "base.html" %}

{% block title %}Login - FlickBase{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem;">
                    <h2 class="text-center mb-0"><i class="fas fa-sign-in-alt"></i> {{ t('auth.welcome_back') }}</h2>
                </div>
                <div class="card-body p-5">
                    <p class="text-center text-muted mb-4">{{ t('auth.signin_sub') }}</p>
                    
                    <form method="POST" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">{{ t('auth.username') }}</label>
                            <input type="text" class="form-control rounded-lg" id="username" name="username" required 
                                placeholder="{{ t('auth.enter_username') }}" autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">{{ t('auth.password') }}</label>
                            <input type="password" class="form-control rounded-lg" id="password" name="password" required 
                                placeholder="{{ t('auth.enter_password') }}">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">
                            <i class="fas fa-arrow-right-to-bracket"></i> {{ t('auth.signin') }}
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted">{{ t('auth.no_account') }} <br>
                        <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">{{ t('auth.create_now') }}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
