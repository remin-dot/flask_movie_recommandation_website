{% extends "base.html" %}

{% block title %}Bad Request - FlickBase{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="error-container py-5">
            <h1 class="display-1 text-warning"><i class="fas fa-exclamation-circle"></i></h1>
            <h2>400 - Bad Request</h2>
            <p class="lead text-muted">Sorry, your request couldn't be processed.</p>
            <p class="text-muted">The data you submitted appears to be invalid or incomplete.</p>
            <a href="{{ url_for('movie.home') }}" class="btn btn-primary btn-lg mt-3">
                <i class="fas fa-home"></i> Go Back Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
