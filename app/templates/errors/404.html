{% extends "base.html" %}

{% block title %}Page Not Found - FlickBase{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="error-container py-5">
            <h1 class="display-1 text-danger"><i class="fas fa-exclamation-triangle"></i></h1>
            <h2>404 - Page Not Found</h2>
            <p class="lead text-muted">Sorry, the page you're looking for doesn't exist.</p>
            <a href="{{ url_for('movie.home') }}" class="btn btn-primary btn-lg mt-3">
                <i class="fas fa-home"></i> Go Back Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
