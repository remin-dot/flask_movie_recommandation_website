{% extends "base.html" %}

{% block title %}Forbidden - FlickBase{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="error-container py-5">
            <h1 class="display-1 text-warning"><i class="fas fa-lock"></i></h1>
            <h2>403 - Forbidden</h2>
            <p class="lead text-muted">Sorry, you don't have permission to access this page.</p>
            <a href="{{ url_for('movie.home') }}" class="btn btn-primary btn-lg mt-3">
                <i class="fas fa-home"></i> Go Back Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
